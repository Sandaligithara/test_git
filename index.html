<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <style>
        body {
            background-color: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .card {
            background-color: white;
            width: 500px;
            padding: 50px;
            border-radius: 15px;
            text-align: center;
        }

        h1 {
            color: #1a1a2e;
        }

        p {
            color: #555;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        a {
            background-color: #e94560;
            color: white;
            padding: 12px 35px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 16px;
        }

        a:hover {
            background-color: #c73652;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🏠 Welcome Home</h1>
        <p>Choose a slide to view</p>

        <div class="buttons">
            <a href="first.html">Slide 1</a>
            <a href="second.html">Slide 2</a>
        </div>
    </div>

</body>
</html>
